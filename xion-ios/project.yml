name: XionDemo
options:
  bundleIdPrefix: com.burnt.xiondemo
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES

packages:
  Mob:
    path: vendor/mob
  UncommonCrypto.swift:
    path: vendor/uncommon-crypto
  Bip39:
    path: vendor/bip39
  LinkKit:
    url: https://github.com/plaid/plaid-link-ios
    from: "5.6.0"

targets:
  XionDemo:
    type: application
    platform: iOS
    sources:
      - path: XionDemo
        excludes:
          - Frameworks
          - Info.plist
          - XionDemo.entitlements
    dependencies:
      - package: Mob
        product: Mob
      - package: Bip39
        product: Bip39
      - package: LinkKit
        product: LinkKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.burnt.xiondemo.ios
        INFOPLIST_FILE: XionDemo/Info.plist
        CODE_SIGN_ENTITLEMENTS: XionDemo/XionDemo.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 9
        DEVELOPMENT_TEAM: "85A34A7PB2"
        TARGETED_DEVICE_FAMILY: "1"
        OTHER_LDFLAGS:
          - "-lresolv"
    info:
      path: XionDemo/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - xiondemo
            CFBundleURLName: com.burnt.xiondemo.ios

  XionDemoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: XionDemoTests
    dependencies:
      - target: XionDemo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.burnt.xiondemo.ios.tests
